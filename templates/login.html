<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login SENAI</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      background: linear-gradient(135deg, #111, #000);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container{
      width: 400px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      border-top: 8px solid #cc0000;
      box-shadow: 0 0 25px rgba(255,0,0,0.3);
    }

    .topo{
      text-align: center;
      margin-bottom: 30px;
    }

    .topo h1{
      color: #cc0000;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .topo h2{
      color: #111;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .topo p{
      color: #666;
      font-size: 14px;
    }

    form{
      display: flex;
      flex-direction: column;
    }

    .campo{
      margin-bottom: 20px;
    }

    label{
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #222;
    }

    input{
      width: 100%;
      padding: 14px;
      border: 2px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus{
      border-color: #cc0000;
      outline: none;
      box-shadow: 0 0 10px rgba(204,0,0,0.2);
    }

    .botao{
      margin-top: 10px;
    }

    button{
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #cc0000;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #990000;
    }

    .linha{
      margin: 25px 0 15px;
      border-top: 1px solid #ddd;
    }

    .cadastro{
      text-align: center;
    }

    .cadastro p{
      color: #555;
      margin-bottom: 10px;
    }

    .cadastro a{
      text-decoration: none;
      color: #cc0000;
      font-weight: bold;
      transition: 0.3s;
    }

    .cadastro a:hover{
      color: black;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topo">
      <h1>SENAI</h1>
      <h2>Entrar na Conta</h2>
      <p>Digite seus dados para acessar o sistema</p>
    </div>

    <form action="/login" method="post">

      <div class="campo">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          name="email" 
          placeholder="exemplo@gmail.com"
          required
        >
      </div>

      <div class="campo">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha"
          name="senha" 
          placeholder="Digite sua senha"
          required
        >
      </div>
      
      <div class="botao">
        <button type="submit">ENTRAR</button>
      </div>

    </form>

    <div class="linha"></div>

    <div class="cadastro">
      <p>Ainda não possui cadastro?</p>
      <a href="/cadastro">Criar nova conta</a>
    </div>

  </div>

</body>
</html>
