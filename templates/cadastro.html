<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro SENAI</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      background: linear-gradient(135deg, #111, #000);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container{
      width: 420px;
      background: white;
      padding: 40px;
      border-radius: 20px;
      border-top: 8px solid #cc0000;
      box-shadow: 0 0 25px rgba(255,0,0,0.3);
    }

    .topo{
      text-align: center;
      margin-bottom: 30px;
    }

    .topo h1{
      color: #cc0000;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .topo h2{
      color: #111;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .topo p{
      color: #666;
      font-size: 14px;
    }

    form{
      display: flex;
      flex-direction: column;
    }

    .campo{
      margin-bottom: 20px;
    }

    label{
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #222;
    }

    input{
      width: 100%;
      padding: 14px;
      border: 2px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus{
      border-color: #cc0000;
      outline: none;
      box-shadow: 0 0 10px rgba(204,0,0,0.2);
    }

    .dica{
      font-size: 12px;
      color: #777;
      margin-top: 6px;
    }

    .botao{
      margin-top: 10px;
    }

    button{
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #cc0000;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #990000;
    }

    .linha{
      margin: 25px 0 15px;
      border-top: 1px solid #ddd;
    }

    .login{
      text-align: center;
    }

    .login p{
      color: #555;
      margin-bottom: 10px;
    }

    .login a{
      text-decoration: none;
      color: #cc0000;
      font-weight: bold;
      transition: 0.3s;
    }

    .login a:hover{
      color: black;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="topo">
      <h1>SENAI</h1>
      <h2>Criar Conta</h2>
      <p>Preencha os campos abaixo para realizar seu cadastro</p>
    </div>

    <form action="/cadastro" method="post">

      <div class="campo">
        <label for="nome">Nome</label>

        <input 
          type="text"
          id="nome"
          name="nome"
          placeholder="Digite seu nome"
          required
        >
      </div>

      <div class="campo">
        <label for="email">Email</label>

        <input 
          type="email" 
          id="email"
          name="email" 
          placeholder="exemplo@gmail.com"
          required
        >
      </div>

      <div class="campo">
        <label for="senha">Senha</label>

        <input 
          type="password" 
          id="senha"
          name="senha" 
          placeholder="Crie uma senha"
          required
        >

        <div class="dica">
          Use letras, números e símbolos para uma senha mais segura.
        </div>
      </div>

      {% if erro %}
          <p style="color: red;">{{ erro }}</p>
      {% endif %}

      <br>

      <div class="botao">
        <button type="submit">CRIAR CONTA</button>
      </div>

    </form>

    <div class="linha"></div>

    <div class="login">
      <p>Já possui uma conta?</p>
      <a href="/login">Fazer login</a>
    </div>

  </div>

</body>
</html>
